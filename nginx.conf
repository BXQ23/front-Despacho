server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Soporte para React Router:
    # Si el archivo no existe, redirige al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos generados por Vite (con hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Seguridad: ocultar versión de Nginx
    server_tokens off;
}
