name: CI/CD — Front Despacho

# ─────────────────────────────────────────────────────────────────
# Trigger: se activa únicamente cuando se hace push a la rama deploy
# ─────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - deploy

env:
  IMAGE_NAME: front-despacho

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Build & Push imagen a Docker Hub
  # La URL del backend se pasa como build-arg para
  # que Vite la incruste en el bundle estático.
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Pasamos la IP/DNS del backend como build-arg.
          # Vite lo expone como import.meta.env.VITE_API_URL en el código.
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # JOB 2: Deploy en EC2 Frontend (SSH)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Iniciando deploy front-despacho ==="

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            cd ~/app

            docker compose pull front-despacho

            docker compose up -d --no-deps front-despacho

            docker image prune -f

            echo "=== Deploy front-despacho completado ==="
